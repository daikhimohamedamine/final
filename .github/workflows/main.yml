name: Build & Deploy Spring app

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: arenaLink
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: 17

      - name: Configure MySQL Connection
        run: |
          echo "spring.datasource.url=jdbc:mysql://127.0.0.1:3306/arenaLink" >> $GITHUB_ENV
          echo "spring.datasource.username=root" >> $GITHUB_ENV
          echo "spring.datasource.password=root" >> $GITHUB_ENV

      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: backend

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/medical-api:latest

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: SSH and Deploy with Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/medical-api:latest
            docker stop medical-api || true
            docker rm medical-api || true
            docker run -d --name medical-api \
              -p 8081:8081 \
              --network medical-net \
              -e SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/arenaLink \
              -e SPRING_DATASOURCE_USERNAME=root \
              -e SPRING_DATASOURCE_PASSWORD=root \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              -e SERVER_PORT=8081 \
              -e SERVER_SERVLET_CONTEXT_PATH=/api \
              ${{ secrets.DOCKER_USERNAME }}/medical-api:latest
