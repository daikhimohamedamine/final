<div class="login-page">
  <div class="login__panel">
    <a routerLink="/" class="login__brand" aria-label="Medzoon home">
      <span class="login__brand-mark">
        <svg viewBox="0 0 32 32" width="36" height="36">
          <rect width="32" height="32" rx="9" fill="url(#lg)"/>
          <path d="M14 8h4v6h6v4h-6v6h-4v-6H8v-4h6z" fill="#fff"/>
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0%" stop-color="#2563EB"/>
              <stop offset="100%" stop-color="#1E3A8A"/>
            </linearGradient>
          </defs>
        </svg>
      </span>
      <span class="login__brand-text">Medzoon</span>
    </a>

    <h1>Welcome back</h1>
    <p class="login__sub">Sign in to access your medical records workspace.</p>

    <form (submit)="submit($event)" class="login__form" novalidate>
      <label class="login__field">
        <span>Email</span>
        <input
          type="email"
          name="email"
          autocomplete="username"
          required
          [value]="email()"
          (input)="email.set($any($event.target).value)"
          placeholder="you@medzoon.health"
        />
      </label>

      <label class="login__field">
        <span>Password</span>
        <input
          type="password"
          name="password"
          autocomplete="current-password"
          required
          [value]="password()"
          (input)="password.set($any($event.target).value)"
          placeholder="••••••••"
        />
      </label>

      @if (error()) {
        <div class="login__error" role="alert">
          <app-icon name="close" [size]="14"></app-icon>
          {{ error() }}
        </div>
      }

      <button type="submit" class="btn btn-primary login__submit" [disabled]="loading()">
        {{ loading() ? 'Signing in…' : 'Sign In' }}
        <app-icon name="arrow-right" [size]="16"></app-icon>
      </button>
    </form>


  </div>

  <aside class="login__art" aria-hidden="true">
    <div class="login__art-overlay"></div>
    <img
      src="https://images.unsplash.com/photo-1631815589968-fdb09a223b1e?auto=format&fit=crop&w=1200&q=80"
      alt=""
    />
    <div class="login__art-content">
      <span class="eyebrow eyebrow--inverted">Secure Workspace</span>
      <h2>Built for clinicians who can't afford downtime.</h2>
      <ul>
        <li><app-icon name="shield" [size]="18"></app-icon> HIPAA & GDPR compliant by design</li>
        <li><app-icon name="lock" [size]="18"></app-icon> End-to-end encrypted records</li>
        <li><app-icon name="users" [size]="18"></app-icon> Role-based access with audit trail</li>
      </ul>
    </div>
  </aside>
</div>
