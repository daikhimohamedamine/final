<section class="cta-band" appReveal aria-labelledby="cta-title">
  <div class="container cta-band__inner">
    <div class="cta-band__copy">
      <span class="eyebrow eyebrow--light">Commencez dès aujourd'hui</span>
      <h2 id="cta-title">Prêt à abandonner vos classeurs médicaux ?</h2>
      <p>Planifiez une présentation de 30 minutes avec l'un de nos spécialistes cliniques. Nous vous montrerons comment MediCab s'adapte à vos flux de travail en moins d'une semaine.</p>
    </div>
    <div class="cta-band__actions">
      <a routerLink="/login" class="btn btn-light">
        Réserver une démo <app-icon name="arrow-right" [size]="16"></app-icon>
      </a>
      <a routerLink="/login" class="btn btn-ghost-light">Contacter l'équipe</a>
    </div>
  </div>
</section>
