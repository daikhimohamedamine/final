<section class="cta-band" appReveal aria-labelledby="cta-title">
  <div class="container cta-band__inner">
    <div class="cta-band__copy">
      <span class="eyebrow eyebrow--light">Get Started Today</span>
      <h2 id="cta-title">Ready to retire your medical binders?</h2>
      <p>Book a 30-minute walkthrough with one of our clinical specialists. We'll show you how Medzoon fits your existing workflows in under a week.</p>
    </div>
    <div class="cta-band__actions">
      <a href="#contact" class="btn btn-light">
        Book a Demo <app-icon name="arrow-right" [size]="16"></app-icon>
      </a>
      <a href="#contact" class="btn btn-ghost-light">Contact Sales</a>
    </div>
  </div>
</section>
