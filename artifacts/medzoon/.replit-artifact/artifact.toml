kind = "web"
previewPath = "/"
title = "Medzoon — Medical SaaS"
version = "1.0.0"
id = "artifacts/medzoon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24100

[services.development]
run = "pnpm --filter @workspace/medzoon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medzoon", "run", "build" ]
publicDir = "artifacts/medzoon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24100"
BASE_PATH = "/"
