server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:medical_db;MODE=MySQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false
  flyway:
    enabled: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
  jackson:
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET:please-change-this-secret-key-to-a-very-long-value}
  access-token-minutes: 15
  refresh-token-days: 7

llm:
  base-url: ${LLM_BASE_URL:https://api.openai.com}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:gpt-4o-mini}

logging:
  level:
    org.springframework.security: INFO
